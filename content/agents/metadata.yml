      name: Marketing Strategist
      description: >-
        Senior marketing strategist for SEO, copywriting, brand positioning,
        and multi-channel communication strategies.
      tools:
        - read
        - agent
        - edit
        - search
        - web
        - filesystem/*
        - todo
    claude:
      name: Marketing Strategist
      description: >-
        Senior marketing strategist for SEO, copywriting, brand positioning,
        and multi-channel communication strategies.
      allowedTools:
        - Read
        - Edit
        - WebSearch
